<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partager une Idée</title>
    <style>
        @keyframes glitch {
            0% {
                text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff;
                transform: translate(0);
            }
            20% {
                text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff;
                transform: translate(-2px, 2px);
            }
            40% {
                text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff;
                transform: translate(-2px, -2px);
            }
            60% {
                text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff;
                transform: translate(2px, 2px);
            }
            80% {
                text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff;
                transform: translate(2px, -2px);
            }
            100% {
                text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff;
                transform: translate(0);
            }
        }

        @keyframes scanlines {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 0 10px;
            }
        }

        @keyframes psychedelic {
            0% {
                filter: hue-rotate(0deg) invert(0%);
            }
            25% {
                filter: hue-rotate(90deg) invert(15%);
            }
            50% {
                filter: hue-rotate(180deg) invert(0%);
            }
            75% {
                filter: hue-rotate(270deg) invert(15%);
            }
            100% {
                filter: hue-rotate(360deg) invert(0%);
            }
        }

        @keyframes datamosh {
            0%, 100% {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }
            25% {
                clip-path: polygon(0 5%, 100% 2%, 100% 98%, 0 95%);
            }
            50% {
                clip-path: polygon(0 10%, 100% 8%, 100% 92%, 0 90%);
            }
            75% {
                clip-path: polygon(0 3%, 100% 5%, 100% 97%, 0 94%);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    rgba(255, 255, 255, 0.03),
                    rgba(255, 255, 255, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
            animation: scanlines 8s linear infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            background: #000;
            border: 3px solid #fff;
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.05),
                0 0 60px rgba(255, 0, 255, 0.1);
            max-width: 650px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 0, 255, 0.05) 2px,
                    rgba(255, 0, 255, 0.05) 4px
                );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #fff;
            margin-bottom: 5px;
            font-size: 32px;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: glitch 0.3s infinite;
            font-weight: bold;
            text-shadow: 
                -1px -1px 0 #ff00ff,
                1px 1px 0 #00ffff;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #fff;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #fff;
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            min-height: 120px;
            transition: all 0.3s;
            box-shadow: inset 0 0 10px rgba(255, 0, 255, 0.1);
        }

        textarea:focus {
            outline: none;
            border-color: #0ff;
            box-shadow: 
                inset 0 0 10px rgba(0, 255, 255, 0.2),
                0 0 20px rgba(0, 255, 255, 0.3);
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        textarea::placeholder {
            color: #666;
        }

        .char-count {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            text-align: right;
            letter-spacing: 1px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: 2px solid #fff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        button:hover:not(:disabled) {
            background: #000;
            color: #fff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), 0 0 20px rgba(255, 0, 255, 0.5);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border: 2px solid;
            font-size: 12px;
            display: none;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .message.success {
            background: #000;
            color: #0f0;
            border-color: #0f0;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .message.error {
            background: #000;
            color: #f0f;
            border-color: #f0f;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .message.show {
            display: block;
        }

        .stats {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #fff;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .ideas-list {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 2px solid #fff;
        }

        .ideas-list h3 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .idea-item {
            background: transparent;
            padding: 15px;
            border: 1px solid #666;
            margin-bottom: 15px;
            font-size: 13px;
            color: #ddd;
            line-height: 1.6;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            position: relative;
            transition: all 0.3s;
            box-shadow: 
                0 0 15px rgba(255, 0, 255, 0.1),
                inset 0 0 15px rgba(0, 255, 255, 0.05);
        }

        .idea-item:hover {
            border-color: #0ff;
            box-shadow: 
                0 0 25px rgba(0, 255, 255, 0.4),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
            color: #fff;
        }

        .idea-content {
            flex: 1;
            animation: datamosh 4s ease-in-out infinite;
        }

        .idea-time {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .vote-section {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #000;
            padding: 10px 12px;
            border: 1px solid #444;
            flex-shrink: 0;
            min-width: 130px;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.15);
        }

        .vote-btn {
            background: none;
            border: 1px solid #555;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            color: #888;
            font-weight: bold;
        }

        .vote-btn:hover {
            border-color: #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .vote-btn.upvote.active {
            color: #fff;
            border-color: #0f0;
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }

        .vote-btn.downvote.active {
            color: #fff;
            border-color: #f0f;
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.7);
        }

        .score {
            font-weight: bold;
            color: #aaa;
            min-width: 28px;
            text-align: center;
            font-size: 14px;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }

        .score.positive {
            color: #0f0;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
        }

        .score.negative {
            color: #f0f;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.6);
        }

        .restricted-message {
            display: none;
            padding: 15px;
            background: #000;
            border: 2px solid #f0f;
            color: #f0f;
            margin-bottom: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            text-transform: uppercase;
        }

        .restricted-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>💥 VOID</h1>
            <p class="subtitle">~ Whisper Your Void ~</p>

            <div class="restricted-message" id="restrictedMessage">
                ⚠️ You Already Spoke Once
            </div>

            <form id="ideaForm">
                <div class="form-group">
                    <label for="idea">scream into the abyss:</label>
                    <textarea 
                        id="idea" 
                        name="idea" 
                        placeholder="> null void / your thought here..."
                        required
                    ></textarea>
                    <div class="char-count">
                        <span id="charCount">0</span>/500
                    </div>
                </div>

                <button type="submit" id="submitBtn">TRANSMIT</button>
            </form>

            <div class="message" id="message"></div>

            <div class="stats" id="stats">
                loading voids...
            </div>

            <div class="ideas-list" id="ideasList"></div>
        </div>
    </div>

    <script>
        const ideaForm = document.getElementById('ideaForm');
        const ideaTextarea = document.getElementById('idea');
        const charCount = document.getElementById('charCount');
        const messageDiv = document.getElementById('message');
        const statsDiv = document.getElementById('stats');
        const ideasListDiv = document.getElementById('ideasList');
        const submitBtn = document.getElementById('submitBtn');
        const restrictedMessage = document.getElementById('restrictedMessage');

        // Mise à jour du compteur de caractères
        ideaTextarea.addEventListener('input', () => {
            charCount.textContent = ideaTextarea.value.length;
        });

        // Vérifier si l'IP a déjà soumis
        async function checkIpStatus() {
            try {
                const response = await fetch('/api/check-ip');
                const data = await response.json();

                if (data.has_submitted) {
                    restrictedMessage.classList.add('show');
                    ideaForm.style.display = 'none';
                }

                updateStats(data.total_ideas);
            } catch (error) {
                console.error('error:', error);
            }
        }

        // Soumettre une idée
        ideaForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const ideaText = ideaTextarea.value.trim();

            if (!ideaText) {
                showMessage('[ void detected / empty transmission ]', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'TRANSMITTING...';

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ idea: ideaText })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('> transmission complete', 'success');
                    ideaForm.reset();
                    charCount.textContent = '0';
                    restrictedMessage.classList.add('show');
                    ideaForm.style.display = 'none';
                    updateStats(data.total_ideas);
                    loadIdeas();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('[ transmission failed ]', 'error');
                console.error('error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'TRANSMIT';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }

        function updateStats(totalIdeas) {
            statsDiv.innerHTML = `> ${totalIdeas} voice${totalIdeas !== 1 ? 's' : ''} in the void`;
        }

        async function handleVote(ideaId, voteType, buttonElement) {
            try {
                const response = await fetch('/api/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        idea_id: ideaId, 
                        vote: buttonElement.classList.contains('active') ? 0 : voteType
                    })
                });

                const data = await response.json();

                if (data.success) {
                    loadIdeas();
                } else {
                    console.error('vote error:', data.message);
                }
            } catch (error) {
                console.error('error:', error);
            }
        }

        async function loadIdeas() {
            try {
                const response = await fetch('/api/ideas');
                const data = await response.json();

                if (data.ideas.length === 0) {
                    ideasListDiv.innerHTML = '';
                    return;
                }

                let html = '<h3>~ VOID ~</h3>';
                data.ideas.forEach(idea => {
                    const date = new Date(idea.timestamp).toLocaleString('en-US', { 
                        year: 'numeric', 
                        month: '2-digit', 
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    const scoreClass = idea.score > 0 ? 'positive' : idea.score < 0 ? 'negative' : '';
                    const upvoteActive = idea.user_vote === 1 ? 'active' : '';
                    const downvoteActive = idea.user_vote === -1 ? 'active' : '';
                    
                    html += `
                        <div class="idea-item">
                            <div class="idea-content">
                                ${idea.text}
                                <div class="idea-time">[${date}]</div>
                            </div>
                            <div class="vote-section">
                                <button class="vote-btn upvote ${upvoteActive}" onclick="handleVote('${idea.id}', 1, this)" title="affirm">
                                    ▲
                                </button>
                                <span class="score ${scoreClass}">${idea.score}</span>
                                <button class="vote-btn downvote ${downvoteActive}" onclick="handleVote('${idea.id}', -1, this)" title="negate">
                                    ▼
                                </button>
                            </div>
                        </div>
                    `;
                });

                ideasListDiv.innerHTML = html;
            } catch (error) {
                console.error('error:', error);
            }
        }

        // Initialisation
        checkIpStatus();
        loadIdeas();

        // Actualiser les idées toutes les 10 secondes
        setInterval(loadIdeas, 10000);
    </script>
</body>
</html>
